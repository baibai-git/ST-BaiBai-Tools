<div class="bai_bai_toolkit_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>柏宝箱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label" for="bai_bai_toolkit_resize_guard_enabled" title="减少输入框和自动补全在窗口尺寸变化时的重复布局计算。">
                    <input id="bai_bai_toolkit_resize_guard_enabled" type="checkbox" class="checkbox">
                    <span>输入框响应优化</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_textarea_scroll_optimization_enabled" title="减少手机端角色描述编辑框内部滚动时的隐藏光标定位计算，并降低长文本滚动的绘制成本。">
                    <input id="bai_bai_toolkit_textarea_scroll_optimization_enabled" type="checkbox" class="checkbox">
                    <span>角色描述滚动优化</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_ime_commit_optimization_enabled" title="手机端输入法候选词提交到较长角色描述时，先让文字上屏，再延迟触发保存、Token 统计和自动补全检查。">
                    <input id="bai_bai_toolkit_ime_commit_optimization_enabled" type="checkbox" class="checkbox">
                    <span>输入法候选提交优化</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_world_info_drawer_optimization_enabled" title="世界书条目展开/收起时跳过高度动画，保留已初始化的编辑区，并延迟初始化部分较重的下拉控件和角色过滤选项。">
                    <input id="bai_bai_toolkit_world_info_drawer_optimization_enabled" type="checkbox" class="checkbox">
                    <span>世界书条目快速展开</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_fast_chat_list_enabled" title="普通角色空搜索时，先显示轻量聊天文件列表，再补齐详细信息。">
                    <input id="bai_bai_toolkit_fast_chat_list_enabled" type="checkbox" class="checkbox">
                    <span>管理聊天文件请求加速</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_chat_list_scroll_optimization_enabled" title="减少管理聊天文件列表屏幕外条目的布局和绘制，缓解大量聊天文件时的滚动卡顿。">
                    <input id="bai_bai_toolkit_chat_list_scroll_optimization_enabled" type="checkbox" class="checkbox">
                    <span>管理聊天文件滚动优化</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_chat_list_auto_clear_enabled" title="管理聊天文件窗口关闭后，清空已生成的聊天文件列表元素，减少关闭后的 DOM 占用。">
                    <input id="bai_bai_toolkit_chat_list_auto_clear_enabled" type="checkbox" class="checkbox">
                    <span>管理聊天文件关闭清理</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_preset_scroll_optimization_enabled" title="对预设界面列表条目启用安全的绘制隔离，减少部分重绘开销。">
                    <input id="bai_bai_toolkit_preset_scroll_optimization_enabled" type="checkbox" class="checkbox">
                    <span>预设界面滚动优化</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_preset_switch_optimization_enabled" title="切换 OpenAI 预设后立即刷新预设条目列表，并在列表显示后再异步刷新 Token 统计。手机端会先收起预设下拉框，再继续执行切换逻辑。删除当前预设后会优先选中下一项。">
                    <input id="bai_bai_toolkit_preset_switch_optimization_enabled" type="checkbox" class="checkbox">
                    <span>切换预设快速刷新</span>
                </label>
                <label class="checkbox_label" for="bai_bai_toolkit_preset_toggle_optimization_enabled" title="切换或保存已有预设条目时只更新当前条目，并延迟刷新 Token 统计，避免整份预设列表立即重建。">
                    <input id="bai_bai_toolkit_preset_toggle_optimization_enabled" type="checkbox" class="checkbox">
                    <span>预设快速操作</span>
                </label>
            </div>
        </div>
    </div>
</div>
